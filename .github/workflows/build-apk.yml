name: Build & Release Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Masary APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Runtimes ──────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Android SDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "extras;android;m2repository" \
            "extras;google;m2repository"

      # ── 4. Web build ─────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      - name: Build Next.js static export
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}

      # ── 5. Capacitor ─────────────────────────────────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Copy web assets into Android project
        run: npx cap sync android

      # ── 6. SMS permissions + receiver ────────────────────────────────────
      - name: Add SMS permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "RECEIVE_SMS" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECEIVE_SMS"\/>\n<\/manifest>|' "$MANIFEST"
            echo "Added RECEIVE_SMS permission"
          fi
          if ! grep -q "SmsReceiver" "$MANIFEST"; then
            sed -i 's|</application>|        <receiver android:name=".SmsReceiver" android:exported="true"><intent-filter android:priority="999"><action android:name="android.provider.Telephony.SMS_RECEIVED"\/><\/intent-filter><\/receiver>\n    <\/application>|' "$MANIFEST"
            echo "Added SmsReceiver to manifest"
          fi

      # ── 7. Native SMS Capacitor plugin ───────────────────────────────────
      - name: Inject native SMS plugin Java files
        run: |
          JAVA_DIR="android/app/src/main/java/com/masary/app"

          # SmsPlugin.java — Capacitor plugin, fires JS event on each SMS received
          cat > "$JAVA_DIR/SmsPlugin.java" << 'JAVAEOF'
          package com.masary.app;
          import android.Manifest;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;
          import com.getcapacitor.annotation.Permission;
          import com.getcapacitor.annotation.PermissionCallback;
          @CapacitorPlugin(name = "SmsPlugin", permissions = {
              @Permission(strings = { Manifest.permission.RECEIVE_SMS }, alias = "receiveSms")
          })
          public class SmsPlugin extends Plugin {
              public void onSmsReceived(String sender, String body) {
                  JSObject d = new JSObject();
                  d.put("sender", sender != null ? sender : "");
                  d.put("body", body != null ? body : "");
                  notifyListeners("smsReceived", d, true);
              }
              @PluginMethod
              public void requestPermission(PluginCall call) {
                  requestAllPermissions(call, "permissionResult");
              }
              @PermissionCallback
              private void permissionResult(PluginCall call) {
                  call.resolve();
              }
          }
          JAVAEOF

          # SmsReceiver.java — BroadcastReceiver, receives new SMS from Android OS
          cat > "$JAVA_DIR/SmsReceiver.java" << 'JAVAEOF'
          package com.masary.app;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Bundle;
          import android.telephony.SmsMessage;
          public class SmsReceiver extends BroadcastReceiver {
              public static SmsPlugin plugin = null;
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (plugin == null) return;
                  try {
                      Bundle b = intent.getExtras();
                      if (b == null) return;
                      Object[] pdus = (Object[]) b.get("pdus");
                      if (pdus == null) return;
                      String fmt = b.getString("format");
                      StringBuilder body = new StringBuilder();
                      String sender = null;
                      for (Object pdu : pdus) {
                          SmsMessage m = SmsMessage.createFromPdu((byte[]) pdu, fmt);
                          if (m == null) continue;
                          if (sender == null) sender = m.getDisplayOriginatingAddress();
                          body.append(m.getMessageBody());
                      }
                      if (body.length() > 0) plugin.onSmsReceived(sender, body.toString());
                  } catch (Exception ignored) {}
              }
          }
          JAVAEOF

          # Overwrite MainActivity.java to register the plugin and connect the receiver
          cat > "$JAVA_DIR/MainActivity.java" << 'JAVAEOF'
          package com.masary.app;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.PluginHandle;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(SmsPlugin.class);
                  super.onCreate(savedInstanceState);
                  try {
                      PluginHandle h = getBridge().getPlugin("SmsPlugin");
                      if (h != null) SmsReceiver.plugin = (SmsPlugin) h.getInstance();
                  } catch (Exception ignored) {}
              }
          }
          JAVAEOF

          echo "Native SMS plugin files written"

      # ── 8. Sign config ───────────────────────────────────────────────────
      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      # ── 9. Gradle build ──────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME:    ${{ env.JAVA_HOME }}

      # ── 10. Locate output ────────────────────────────────────────────────
      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      # ── 11. Upload artifact ──────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: masary-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # ── 12. GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release & attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.${{ github.run_number }}.0
          name: "مصرى Masary v0.${{ github.run_number }}.0"
          body: |
            ## مصرى — Masary APK

            ### Install on your Android phone
            1. Download **`masary-debug.apk`** from the Assets below
            2. Enable **Settings → Security → Install unknown apps** on your phone
            3. Tap the downloaded file → **Install**

            > Built from commit `${{ github.sha }}`
          files: ${{ steps.find_apk.outputs.apk_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
